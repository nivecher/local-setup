---
# Main configuration variables for local development setup

# Python Configuration
python_version: "3.13.9"   # Python version to install via pyenv

# Shell Configuration
default_shell: zsh
zsh_theme: "robbyrussell"   # Oh My Zsh theme

# User Configuration
username: "{{ lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true) | default(lookup('env', 'LOGNAME'), true) }}"

# Development Tools
# Format: tool_name: version
#   - null = install from the current Homebrew formula, no pin
#   - awscli = official AWS CLI v2 installer, user-local under ~/.local
#   - terraform = exact version installed via tfenv
#   - node = major version installed via Homebrew formula node@<major>
#   - other non-null values = install current Homebrew formula and brew-pin it
#
# Terraform: uses tfenv, version required (e.g. "1.5.7")
# Node: use "18", "20", "22" for node@18, node@20, etc.
# Others: Homebrew does not provide arbitrary exact historical formula versions.
development_tools:
  awscli: null
  terraform: "1.14.5"
  terragrunt: "0.99.2"
  pre-commit: null
  gh: null
  jq: null
  yq: null
  shfmt: null
  shellcheck: null
  node: null
  go: null

# System packages (OS-specific, defined in roles)
base_packages:
  - curl
  - wget
  - git
  - tree
  - gawk
  - zsh

# Homebrew configuration
homebrew_install_path: /home/linuxbrew/.linuxbrew
