---
- name: User Privileged Configuration
  hosts: localhost
  connection: local
  become: "{{ user_privileged_become | default(true) }}"
  gather_facts: false
  tags:
    - privileged_user
  module_defaults:
    ansible.builtin.shell:
      executable: /bin/bash

  vars_files:
    - ../vars/main.yml

  tasks:
    # Shell Configuration
    - name: Ensure zsh is installed
      ansible.builtin.package:
        name: "{{ default_shell }}"
        state: present

    - name: Resolve default shell path
      ansible.builtin.shell: "command -v {{ default_shell }}"
      args:
        executable: /bin/bash
      register: default_shell_path
      changed_when: false

    - name: Ensure default shell is listed in /etc/shells
      ansible.builtin.lineinfile:
        path: /etc/shells
        line: "{{ default_shell_path.stdout }}"
        create: true
        mode: '0644'

    - name: Change default shell
      ansible.builtin.user:
        name: "{{ username }}"
        shell: "{{ default_shell_path.stdout }}"

    - name: Resolve primary group
      ansible.builtin.command:
        argv:
          - id
          - -gn
          - "{{ username }}"
      register: primary_group
      changed_when: false

    - name: Ensure Homebrew parent directory exists
      ansible.builtin.file:
        path: "{{ homebrew_install_path | dirname }}"
        state: directory
        owner: "{{ username }}"
        group: "{{ primary_group.stdout }}"
        mode: '0750'

    - name: Ensure Homebrew prefix is writable by user
      ansible.builtin.file:
        path: "{{ homebrew_install_path }}"
        state: directory
        owner: "{{ username }}"
        group: "{{ primary_group.stdout }}"
        mode: '0750'

- name: User Configuration
  hosts: localhost
  connection: local
  become: false
  gather_facts: true
  module_defaults:
    ansible.builtin.shell:
      executable: /bin/bash

  vars_files:
    - ../vars/main.yml

  vars:
    user_home: "{{ lookup('env', 'HOME') }}"
    git_config_file: "{{ playbook_dir }}/../config/git.yml"

  tasks:
    # Shell Configuration

    - name: Check if Oh My Zsh is installed
      ansible.builtin.stat:
        path: "{{ user_home }}/.oh-my-zsh"
      register: ohmyzsh_exists

    - name: Install Oh My Zsh
      ansible.builtin.shell: |
        set -o pipefail
        # Use curl if available, fallback to wget
        if command -v curl >/dev/null 2>&1; then
          ZSH="" sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
        elif command -v wget >/dev/null 2>&1; then
          ZSH="" sh -c "$(wget https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh -O -)"
        else
          echo "Neither curl nor wget available"
          exit 1
        fi
      args:
        executable: /bin/bash
      environment:
        RUNZSH: "no"
        CHSH: "no"
        ZSH: ""
      when: not ohmyzsh_exists.stat.exists

    - name: Copy zsh plugins configuration
      ansible.builtin.copy:
        src: ../config/zsh-plugins.sh
        dest: "{{ user_home }}/.zsh-plugins.sh"
        mode: '0600'
        force: false

    # Optional Git Configuration
    - name: Check for local git configuration
      ansible.builtin.stat:
        path: "{{ git_config_file }}"
      register: git_config_file_status

    - name: Load local git configuration
      ansible.builtin.include_vars:
        file: "{{ git_config_file }}"
        name: local_git
      when: git_config_file_status.stat.exists

    - name: Read current global git configuration
      ansible.builtin.command:
        argv:
          - git
          - config
          - --global
          - --get
          - "{{ item.key }}"
      loop: "{{ local_git.git_config | default({}) | dict2items }}"
      register: current_git_config
      changed_when: false
      failed_when: false
      when: git_config_file_status.stat.exists

    - name: Apply global git configuration
      ansible.builtin.command:
        argv:
          - git
          - config
          - --global
          - "{{ item.item.key }}"
          - "{{ item.item.value | string }}"
      loop: "{{ current_git_config.results | default([]) }}"
      changed_when: true
      when:
        - item.rc != 0 or item.stdout != (item.item.value | string)

    - name: Configure Oh My Zsh theme in .zshrc
      ansible.builtin.lineinfile:
        path: "{{ user_home }}/.zshrc"
        regexp: "^ZSH_THEME="
        line: "ZSH_THEME=\"{{ zsh_theme }}\""
        create: true
        mode: '0600'

    - name: Check for existing Oh My Zsh plugins in .zshrc
      ansible.builtin.command:
        argv:
          - grep
          - -Eq
          - "^plugins="
          - "{{ user_home }}/.zshrc"
      register: zshrc_plugins
      changed_when: false
      failed_when: false

    - name: Add default Oh My Zsh plugins in .zshrc
      ansible.builtin.lineinfile:
        path: "{{ user_home }}/.zshrc"
        line: "plugins=(git)"
        insertafter: "^ZSH_THEME="
        create: true
      when: zshrc_plugins.rc != 0

    - name: Remove misplaced custom plugin source
      ansible.builtin.lineinfile:
        path: "{{ user_home }}/.zshrc"
        regexp: '.zsh-plugins.sh'
        state: absent
      when: zshrc_plugins.rc != 0

    - name: Source custom plugins before Oh My Zsh
      ansible.builtin.lineinfile:
        path: "{{ user_home }}/.zshrc"
        regexp: '.zsh-plugins.sh'
        line: '[ -f ~/.zsh-plugins.sh ] && source ~/.zsh-plugins.sh'
        insertbefore: "^source.*oh-my-zsh.sh"
        create: true
      when: zshrc_plugins.rc != 0

    - name: Source Oh My Zsh
      ansible.builtin.lineinfile:
        path: "{{ user_home }}/.zshrc"
        regexp: "^source.*oh-my-zsh.sh"
        line: "source $ZSH/oh-my-zsh.sh"
        create: true

    - name: Add Homebrew shellenv to .zshrc
      ansible.builtin.lineinfile:
        path: "{{ user_home }}/.zshrc"
        regexp: 'brew shellenv'
        line: 'eval "$({{ homebrew_install_path }}/bin/brew shellenv)"'
        create: true

    - name: Add .local/bin to PATH in .zshrc
      ansible.builtin.lineinfile:
        path: "{{ user_home }}/.zshrc"
        regexp: '\.local/bin.*PATH'
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        create: true

    - name: Remove legacy global browser helper from .zshrc
      ansible.builtin.lineinfile:
        path: "{{ user_home }}/.zshrc"
        regexp: '^export BROWSER="\$HOME/\.local/bin/browser-helper"$'
        state: absent

    # Terraform
    - name: Create Terraform configuration directory
      ansible.builtin.file:
        path: "{{ user_home }}/.terraform.d"
        state: directory
        mode: '0700'
      when: development_tools.terraform is defined

    - name: Create Terraform plugin cache directory
      ansible.builtin.file:
        path: "{{ user_home }}/.terraform.d/plugin-cache"
        state: directory
        mode: '0700'
      when: development_tools.terraform is defined

    # Homebrew
    - name: Check if Homebrew exists
      ansible.builtin.stat:
        path: "{{ homebrew_install_path }}/bin/brew"
      register: homebrew_exists

    - name: Install Homebrew
      ansible.builtin.shell: |
        set -o pipefail
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      args:
        executable: /bin/bash
      environment:
        NONINTERACTIVE: "1"
      when: not homebrew_exists.stat.exists
      register: homebrew_install_result
      changed_when: homebrew_install_result.rc == 0

    # pyenv and Python
    - name: Check if pyenv is installed
      ansible.builtin.stat:
        path: "{{ user_home }}/.pyenv"
      register: pyenv_exists

    - name: Install pyenv
      ansible.builtin.shell: |
        set -o pipefail
        curl -fsSL https://pyenv.run | bash
      args:
        executable: /bin/bash
      when: not pyenv_exists.stat.exists

    - name: Remove legacy pyenv shell initialization
      ansible.builtin.lineinfile:
        path: "{{ user_home }}/.zshrc"
        regexp: "{{ item }}"
        state: absent
      loop:
        - '^export PYENV_ROOT="\$HOME/\.pyenv"$'
        - '^eval "\$\(pyenv init -\)"$'
        - '^eval "\$\(pyenv init --path\)"$'

    - name: Configure pyenv login shell initialization
      ansible.builtin.blockinfile:
        path: "{{ user_home }}/.zprofile"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - pyenv login"
        create: true
        mode: '0600'
        block: |
          export PYENV_ROOT="${PYENV_ROOT:-$HOME/.pyenv}"
          [[ -d "$PYENV_ROOT/bin" ]] && export PATH="$PYENV_ROOT/bin:$PATH"
          command -v pyenv >/dev/null && eval "$(pyenv init --path)"

    - name: Configure pyenv interactive shell initialization
      ansible.builtin.blockinfile:
        path: "{{ user_home }}/.zshrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - pyenv interactive"
        create: true
        mode: '0600'
        block: |
          export PYENV_ROOT="${PYENV_ROOT:-$HOME/.pyenv}"
          [[ -d "$PYENV_ROOT/bin" ]] && export PATH="$PYENV_ROOT/bin:$PATH"
          command -v pyenv >/dev/null && eval "$(pyenv init - zsh)"

    - name: Check if Python version is installed
      ansible.builtin.shell: |
        set -o pipefail
        export PYENV_ROOT="$HOME/.pyenv"
        export PATH="$PYENV_ROOT/bin:$PATH"
        eval "$(pyenv init --path)" 2>/dev/null || true
        eval "$(pyenv init - bash)" 2>/dev/null || true
        pyenv versions --bare | grep -x "{{ python_version }}" || echo "not_installed"
      args:
        executable: /bin/bash
      register: python_check
      changed_when: false

    - name: Install Python version via pyenv
      ansible.builtin.shell: |
        set -o pipefail
        export PYENV_ROOT="$HOME/.pyenv"
        export PATH="$PYENV_ROOT/bin:$PATH"
        eval "$(pyenv init --path)"
        eval "$(pyenv init - bash)"
        pyenv install {{ python_version }}
        pyenv global {{ python_version }}
      args:
        executable: /bin/bash
      when: python_check.stdout == "not_installed"
      register: python_install_result
      changed_when: python_install_result.rc == 0

    # SSH
    - name: Create .ssh directory
      ansible.builtin.file:
        path: "{{ user_home }}/.ssh"
        state: directory
        mode: '0700'

    - name: Check if SSH key exists
      ansible.builtin.stat:
        path: "{{ user_home }}/.ssh/id_rsa"
      register: ssh_private_key

    - name: Check if SSH public key exists
      ansible.builtin.stat:
        path: "{{ user_home }}/.ssh/id_rsa.pub"
      register: ssh_public_key

    - name: Generate SSH keypair
      ansible.builtin.command:
        argv:
          - ssh-keygen
          - -q
          - -t
          - rsa
          - -b
          - "4096"
          - -N
          - ""
          - -C
          - "{{ username }}@{{ ansible_facts['hostname'] }}"
          - -f
          - "{{ user_home }}/.ssh/id_rsa"
      when: not ssh_private_key.stat.exists
      register: ssh_keygen
      changed_when: ssh_keygen.rc == 0

    - name: Rebuild missing SSH public key
      ansible.builtin.shell: |
        set -o pipefail
        ssh-keygen -y -f "{{ user_home }}/.ssh/id_rsa" > "{{ user_home }}/.ssh/id_rsa.pub"
        chmod 0644 "{{ user_home }}/.ssh/id_rsa.pub"
      when:
        - ssh_private_key.stat.exists
        - not ssh_public_key.stat.exists
      register: ssh_pubkey_rebuild
      changed_when: ssh_pubkey_rebuild.rc == 0

    # Directories and helpers
    - name: Create .local/bin directory
      ansible.builtin.file:
        path: "{{ user_home }}/.local/bin"
        state: directory
        mode: '0700'

    - name: Create browser helper
      ansible.builtin.copy:
        dest: "{{ user_home }}/.local/bin/browser-helper"
        content: |
          #!/bin/bash
          echo "Copy this URL: $1"
        mode: '0700'

    - name: Create browser symlinks
      ansible.builtin.file:
        src: "{{ user_home }}/.local/bin/browser-helper"
        dest: "{{ user_home }}/.local/bin/{{ item }}"
        state: link
      loop:
        - xdg-open
        - x-www-browser
        - www-browser
        - wslview
